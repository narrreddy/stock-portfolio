# Databricks App Runtime Configuration
# Docs: https://learn.microsoft.com/en-us/azure/databricks/dev-tools/databricks-apps/app-runtime/
#
# Environment variables are configured in resources/stock_signal_app.yml
# (injected by DABs at deploy time). Do NOT duplicate them here.

command:
  - "streamlit"
  - "run"
  - "streamlit_app.py"
  - "--server.port"
  - "8501"
  - "--server.headless"
  - "true"
