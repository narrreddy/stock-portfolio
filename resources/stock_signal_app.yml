# =============================================================================
# Resource: Streamlit Databricks App
# Included by databricks.yml via `include: [resources/*.yml]`
# All paths are relative to THIS file's location (resources/).
# =============================================================================

resources:
  apps:
    stock_signal_app:
      name: "stock-signal-dashboard-${bundle.target}"
      description: >
        Live Stock Signal Dashboard — candlestick charts, technical
        indicators, BUY signals, and portfolio tracking.
      source_code_path: ../app

      config:
        command:
          - streamlit
          - run
          - streamlit_app.py
        env:
          - name: DATABRICKS_WAREHOUSE_ID
            value: "${var.warehouse_id}"
          - name: STREAMLIT_GATHER_USAGE_STATS
            value: "false"
          - name: STOCK_CATALOG
            value: "${var.catalog}"
          - name: STOCK_SCHEMA
            value: "${var.schema}"

      permissions:
        - level: CAN_USE
          group_name: users
